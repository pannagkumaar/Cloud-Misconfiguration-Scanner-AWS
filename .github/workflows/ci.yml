name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check cloudscan tests demo

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest --cov=cloudscan --cov-report=term-missing --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  demo:
    name: Demo smoke test (moto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python demo/seed_demo_account.py
      - run: python demo/seed_demo_account.py --output json --output-file demo-findings.json
      - name: Verify demo found the expected issues
        run: |
          python -c "
          import json
          data = json.load(open('demo-findings.json'))
          assert data['summary']['total'] >= 5, f\"expected >=5 findings, got {data['summary']['total']}\"
          assert data['summary']['critical'] >= 1
          print('Demo produced', data['summary']['total'], 'findings as expected')
          "

  sarif-demo:
    name: SARIF upload (demo account findings)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      # NOTE: this scans the moto-simulated demo AWS account, not this
      # repo's own source code -- CloudScan is a CSPM tool, so there's no
      # "vulnerable line of code" to point at. The Security tab entries
      # this produces demonstrate the SARIF output pipeline working
      # end-to-end against GitHub Code Scanning, using the same findings
      # as the demo smoke test job above.
      - run: python demo/seed_demo_account.py --output sarif --output-file demo-findings.sarif
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: demo-findings.sarif
          category: cloudscan-demo-account
